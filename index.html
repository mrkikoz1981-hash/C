<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 Марта!</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        
        /* КАРТИНКА НА ВЕСЬ ЭКРАН */
        .background-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /* ЗДЕСЬ ИМЯ ТВОЕГО ФОТО */
            background-image: url('1772807471347.png');
            background-size: cover; background-position: center; z-index: 1;
        }

        /* ПОДЛОЖКА ДЛЯ ТЕКСТА (чтобы его было видно) */
        .content-overlay {
            position: relative; z-index: 3; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Темный фильтр поверх фото */
            color: #fff; text-align: center; padding: 20px;
        }

        /* КРУПНЫЙ ТЕКСТ С РОЗОВЫМ СВЕЧЕНИЕМ */
        h1 {
            font-size: 3em; margin: 0 0 20px 0; text-transform: uppercase;
            color: #ff4d94; text-shadow: 0 0 15px #ff4d94, 0 0 5px #fff;
        }
        p { font-size: 1.5em; margin: 0; text-shadow: 1px 1px 3px #000; }

        canvas { position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }
    </style>
</head>
<body>
    <div class="background-image"></div>
    <canvas id="canvas"></canvas>
    
    <div class="content-overlay">
        <h1>С 8 МАРТА МОИ ДОРОГИЕ!</h1>
        <p>Счастья, любви и отличного настроения!</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const hearts = [];
        function createHeart() { return { x: Math.random() * canvas.width, y: -20, size: Math.random() * 20 + 10, speed: Math.random() * 3 + 1 }; }
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff4d94';
            if (hearts.length < 50) hearts.push(createHeart());
            hearts.forEach((h, i) => {
                ctx.fillText('❤️', h.x, h.y); h.y += h.speed;
                if (h.y > canvas.height) hearts.splice(i, 1);
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
